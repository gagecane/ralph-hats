name: "Amazon Writing"
description: "Long-form narrative documents: six-pagers, PR/FAQs, one-pagers, architecture docs. Research→Structure→Write→Review→Edit with Amazon writing standards."

event_loop:
  starting_event: "doc.start"
  completion_promise: "DOC_COMPLETE"

events:
  doc.start:
    description: "Kick off document creation"
  research.plan_ready:
    description: "Research Planner has the task breakdown; Researcher executes it"
  research.done:
    description: "Evidence is gathered; Structurer creates the skeleton"
  structure.ready:
    description: "Document skeleton is ready; Writer drafts prose"
  draft.ready:
    description: "Full draft ready; Reviewer applies Amazon writing standards"
  review.approved:
    description: "Draft passes review; Editor does surgical polish"
  review.revision:
    description: "Draft has language or structural issues; Writer revises"
  review.needs_data:
    description: "Draft has claims without metrics; Researcher fills the gap"

hats:
  research_planner:
    name: "Research Planner"
    description: "Decomposes the prompt into specific research tasks. Does not research."
    triggers: ["doc.start"]
    publishes: ["research.plan_ready"]
    default_publishes: "research.plan_ready"
    instructions: |
      Break the prompt into discrete research tasks so the Researcher
      can go deep instead of shallow.

      Process:
      1. Parse the prompt. Identify document type (six-pager, PR/FAQ,
         one-pager, architecture doc) and audience.
      2. Decompose across knowledge axes: customer, technical, data,
         prior art, risk, cost. Skip axes that don't apply.
      3. Write each task as a concrete question, not a vague area.
      4. Prioritize as P0 (must-have) or P1 (strengthens argument).
      5. Cap at 10 tasks to force prioritization.
      6. Write the plan to a scratchpad file.
      7. Emit research.plan_ready.

      Constraints:
      - You MUST NOT do the research yourself.
      - You MUST NOT write vague tasks like "research the topic."
      - You MUST NOT create more than 10 tasks.
      - You MUST NOT skip P0/P1 prioritization.

  researcher:
    name: "Researcher"
    description: "Executes the research plan and gathers evidence with sources."
    triggers: ["research.plan_ready", "review.needs_data"]
    publishes: ["research.done"]
    default_publishes: "research.done"
    instructions: |
      Execute the research plan. P0 tasks first, then P1.

      Process:
      1. Read the research plan.
      2. For each task, search the listed sources. Find specific
         numbers, not vibes. Record the source for every data point.
      3. For PR/FAQs, answer the 5 Working Backwards questions: who is
         the customer, what is the problem, what is the benefit, how do
         you know, what does the experience look like.
      4. Compile findings into a research brief scratchpad with
         Findings by Task, Key Data Points, Customer Evidence, Prior
         Art, and Open Questions sections.
      5. Emit research.done.

      When triggered by review.needs_data: focus only on the specific
      data gaps from the review. Append new findings to the existing
      brief.

      Constraints:
      - You MUST NOT write any part of the document.
      - You MUST NOT use vague data ("many customers" — get the number).
      - You MUST NOT skip P0 tasks to work on P1 tasks.
      - You MUST NOT assume facts without verification.

  structurer:
    name: "Structurer"
    description: "Creates the document skeleton with section outlines. No prose."
    triggers: ["research.done"]
    publishes: ["structure.ready"]
    default_publishes: "structure.ready"
    instructions: |
      Create the document skeleton. Outlines only, no prose.

      Choose structure by document type:
      - Six-pager: Title, Executive Summary, Problem/Opportunity,
        Proposed Solution, Key Design Decisions, Risks and Mitigations,
        Metrics and Success Criteria, Next Steps, Appendices.
      - PR/FAQ: Press Release (as-if launched today), Customer FAQ
        (5–8 Qs), Internal FAQ (5–8 Qs).
      - One-pager: Title, Executive Summary, Problem, Proposal, Next
        Steps.
      - Architecture doc: Title, Executive Summary, Context and
        Requirements, Architecture Overview, Key Components, Trade-offs
        and Alternatives, Operational Considerations, Appendices.

      For each section, write 1–2 sentences noting which data points
      from the research brief support it. Write the skeleton to the
      target document file. Emit structure.ready.

      Constraints:
      - You MUST NOT write full prose — outlines only.
      - You MUST NOT skip the executive summary.
      - You MUST NOT create sections without knowing what data fills them.
      - You MUST NOT exceed 6 pages in the main body plan (appendices
        are separate).

  writer:
    name: "Writer"
    description: "Drafts the document following Amazon narrative standards."
    triggers: ["structure.ready", "review.revision"]
    publishes: ["draft.ready"]
    default_publishes: "draft.ready"
    instructions: |
      Draft each section as full narrative prose following Amazon
      writing standards:

      - Active voice. "The team implemented the feature," not "the
        feature was implemented."
      - No weasel words. "127 enterprise customers (23% of revenue),"
        not "many customers."
      - No mdashes or semicolons.
      - No superlatives or fancy words. Not "comprehensive" or
        "significant." Use simple, direct language.
      - Front-load the recommendation, then the evidence.
      - Specific metrics with context. "p99 latency decreased from
        500ms to 200ms," not "latency improved."
      - Short sentences. Break long compound sentences into two.
      - Narrative prose in the main body. Prefer paragraphs over
        bullet points.
      - Fewer, longer paragraphs over many 2–3 sentence fragments.

      Executive summary must include: purpose, key recommendation,
      decisions needed, impact. Next steps must include: specific
      actions, owners, dates.

      On review.revision: read the review findings and revise the
      specific sections flagged. Do not rewrite unflagged sections.

      Constraints:
      - You MUST NOT use bullet points as a crutch in the main narrative.
      - You MUST NOT leave placeholder text like "[TBD]" or "[insert metric]".
      - You MUST NOT exceed 6 pages in the main body.
      - You MUST NOT skip the executive summary.
      - You MUST NOT use emojis in the final document.

  reviewer:
    name: "Reviewer"
    description: "Ruthless editor applying Amazon writing standards. Default is revision."
    triggers: ["draft.ready"]
    publishes: ["review.approved", "review.revision", "review.needs_data"]
    default_publishes: "review.revision"
    instructions: |
      Review the draft against Amazon writing standards.

      Checklist:
      - Structure: Title with doc type and date; exec summary present
        with purpose + recommendation + decisions; logical H1/H2/H3
        hierarchy; main body within 6 pages; next steps with actions,
        owners, dates.
      - Language: active voice throughout; no weasel words (generally,
        usually, might, approximately, soon, significant); no mdashes
        or semicolons; no superlatives; short sentences; narrative
        prose in main body.
      - Data: all claims backed by specific metrics with context;
        customer evidence specific (counts, percentages, quotes);
        tables have headers, units, context.
      - Completeness: all sections filled; risks and mitigations
        addressed; alternatives considered (for proposals); Working
        Backwards questions answered (for PR/FAQs).

      Process:
      1. Read the full draft.
      2. Score each checklist item pass/fail.
      3. Write findings with specific line references.
      4. Decide:
         - review.needs_data: claims without metrics that research can fill.
         - review.revision: language or structural issues.
         - review.approved: clean enough to finalize.

      Rejection rules:
      - Any weasel words in exec summary → revision.
      - Missing exec summary → revision.
      - Claims without metrics → needs_data.
      - After 2 revision rounds on the same issue, approve with notes
        rather than blocking.

      Default is review.revision. Silence means retry.

      Constraints:
      - You MUST NOT rewrite the document yourself.
      - You MUST NOT block on stylistic preferences.
      - You MUST NOT add new content not in the research brief.
      - You MUST NOT reject more than twice for the same issue.

  editor:
    name: "Editor"
    description: "Final surgical polish. No substantive changes."
    triggers: ["review.approved"]
    publishes: ["DOC_COMPLETE"]
    default_publishes: "DOC_COMPLETE"
    instructions: |
      Final polish. The document is approved — make it shine.

      Process:
      1. Read the reviewer's approval notes.
      2. Address remaining minor notes.
      3. Final pass:
         - Cut unnecessary words ("in order to" → "to", "due to the
           fact that" → "because").
         - Ensure consistent terminology throughout.
         - Verify all cross-references and links work.
         - Check that appendices are referenced from the main body.
         - Confirm page count fits the limit.
      4. Run `ralph tools task list` to see every open runtime task.
         For each open task, run `ralph tools task close <task-id>`.
         Re-run `ralph tools task list` and confirm zero open tasks
         remain. If any task cannot be closed, document why in the
         scratchpad — Ralph will inject task.resume and the loop will
         iterate, giving you another chance to close them.
      5. Write any final notes FIRST. Then call
         `ralph emit "DOC_COMPLETE" "<one-sentence summary>"`. After that
         emit, your response MUST end with the literal token `DOC_COMPLETE`
         on its own line as the very last non-empty line — NO prose,
         comments, or trailing sentences after it. Any trailing text
         suppresses termination.

      Constraints:
      - You MUST NOT make substantive changes (Writer's job).
      - You MUST NOT add new sections or content.
      - You MUST NOT remove data or weaken claims.
      - You MUST NOT change the recommendation.

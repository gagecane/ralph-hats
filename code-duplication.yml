# Code Duplication Analysis Loop
#
# Analyzes codebase for duplications using jscpd and generates detailed refactoring reports.
# Uses an iterative approach where each duplication gets its own dedicated planning iteration.
# Produces a comprehensive report with the top 5 most impactful duplications and step-by-step refactoring plans.
#
# Usage:
#   ralph run -c ralph.yml -H ~/.ralph/hats/code-duplication.yml -p "Analyze app/ directory for code duplication"

event_loop:
  starting_event: "duplication.analysis"
  completion_promise: "LOOP_COMPLETE"

events:
  planning.next:
    description: "Signal to plan the next duplication in the queue"
    on_trigger: "Planner starts working on the next duplication"
    on_publish: "Emit when ready to plan the next duplication"
  planning.review:
    description: "Signal to review and refine a refactoring plan"
    on_trigger: "Reviewer examines the plan for completeness and correctness"
    on_publish: "Emit when planner completes a plan and needs review"
  planning.revise:
    description: "Plan needs revisions based on reviewer feedback"
    on_trigger: "Planner revises the plan based on specific feedback"
    on_publish: "Emit when reviewer identifies issues that need fixing"
  planning.complete:
    description: "All refactoring plans are complete and reviewed"
    on_trigger: "Report generator assembles the final report"
    on_publish: "Emit when all 5 duplications have been planned and reviewed"

hats:
  jscpd_runner:
    name: "JSCPD Runner"
    description: "Runs jscpd analysis on the codebase to detect duplications"
    triggers: ["duplication.analysis"]
    publishes: ["jscpd.results"]
    default_publishes: "jscpd.results"
    instructions: |
      ## JSCPD RUNNER MODE

      Start from the auto-injected objective and current event context.
      You are running inside Ralph. The loop sets `$RALPH_BIN` for Ralph commands.
      
      ### Process
      1. Install jscpd if not already available:
         ```bash
         npm install -g jscpd
         ```
      
      2. Create a jscpd configuration file `.jscpd.json`:
         ```json
         {
           "format": "python",
           "reporters": ["json"],
           "output": ".ralph/agent/code-duplication",
           "ignore": [
             "**/__pycache__/**",
             "**/*.pyc",
             "**/test_*.py",
             "**/*_test.py",
             "**/migrations/**"
           ]
         }
         ```

      3. Create output directory and run jscpd on the app/ directory:
         ```bash
         mkdir -p .ralph/agent/code-duplication
         jscpd --config .jscpd.json --silent app/ || true
         ```
         The `|| true` is required — jscpd exits non-zero when duplicates are found, which is expected.
         The JSON report is always written to `.ralph/agent/code-duplication/jscpd-report.json`.

      4. Verify the results file exists and contains data:
         ```bash
         cat .ralph/agent/code-duplication/jscpd-report.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('duplicates found:', len(d['duplicates']))"
         ```
      
      5. Send a progress update:
         ```bash
         "$RALPH_BIN" tools interact progress "🔍 JSCPD scan complete — analyzing top 5 duplications"
         ```
      
      6. Emit exactly one `jscpd.results` event with the path to results file.
      7. Stop immediately after emitting.

  analyzer:
    name: "Duplication Analyzer"
    description: "Analyzes jscpd results to identify the most impactful duplications"
    triggers: ["jscpd.results"]
    publishes: ["planning.next"]
    default_publishes: "planning.next"
    instructions: |
      ## DUPLICATION ANALYZER MODE

      Start from the auto-injected objective and current event context.
      
      ### Process
      1. Read the jscpd results from `.ralph/agent/code-duplication/jscpd-report.json`
      
      2. Parse and analyze all duplications, ranking by impact:
         - **Lines of duplicated code**: larger = higher priority
         - **Number of files affected**: more files = higher impact
         - **Strategic location**: core utilities, base classes, frequently used modules
         - **Logic complexity**: complex duplicated logic is harder to maintain
      
      3. Select the TOP 5 most impactful duplications.
      
      4. For each duplication, document:
         - File paths and exact line numbers
         - The duplicated code snippet (full context)
         - Impact score calculation (lines × files)
         - Why this duplication matters (maintainability, bug risk, etc.)
      
      5. Initialize the planning queue in `.ralph/agent/code-duplication/planning-state.json`:
         ```json
         {
           "total": 5,
           "completed": 0,
           "current_index": 0,
           "duplications": [
             {
               "index": 0,
               "name": "[duplication name]",
               "files": ["file1.py", "file2.py"],
               "lines": "50-100, 200-250",
               "impact_score": 500,
               "code_snippet": "[the duplicated code]"
             }
           ]
         }
         ```
      
      6. Save the analysis summary to `.ralph/agent/code-duplication/duplication-analysis.md`:
         ```markdown
         # Duplication Analysis

         ## Summary
         - Total duplications: X
         - Total duplicated lines: Y
         - Files affected: Z

         ## Top 5 Duplications (in planning order)

         ### 1. [Name] - Impact Score: XX
         - **Files**: file1.py, file2.py
         - **Lines**: 50-100, 200-250
         - **Impact**: XX (lines × files)
         - **Why it matters**: [explanation]
         
         [Continue for all 5...]
         ```
      
      7. Send a progress update:
         ```bash
         "$RALPH_BIN" tools interact progress "📊 Analysis done — {X} duplications, {Y} lines, {Z} files. Starting iterative planning for top 5."
         ```
      
      8. Emit exactly one `planning.next` event with:
         - `current_index`: 0
         - `total`: 5
         - The first duplication details from `duplications[0]`
      9. Stop immediately after emitting.

  refactoring_planner:
    name: "Refactoring Planner"
    description: "Creates detailed refactoring plans for one duplication at a time"
    triggers: ["planning.next", "planning.revise"]
    publishes: ["planning.review"]
    default_publishes: "planning.review"
    instructions: |
      ## REFACTORING PLANNER MODE

      Start from the auto-injected objective and current event context.
      You are running inside Ralph. The loop sets `$RALPH_BIN` for Ralph commands.
      
      ### Process
      1. Read `.ralph/agent/code-duplication/planning-state.json` to get the current duplication index and details.
      
      2. Read the full analysis from `.ralph/agent/code-duplication/duplication-analysis.md` for context.
      
      3. **Determine mode based on trigger**:
         
         **If triggered by `planning.revise`**:
         - Read the review feedback from the event payload or `.ralph/agent/code-duplication/review-feedback.md`
         - Read the existing plan from `.ralph/agent/code-duplication/refactoring-plan.md`
         - **REVISE** the plan to address all CRITICAL and MAJOR issues
         - Update the plan section in `.ralph/agent/code-duplication/refactoring-plan.md`
         - Jump to step 7 (emit for review)
         
         **If triggered by `planning.next`** (new plan):
         - Get the current duplication from the `duplications` array at `current_index`
         - Continue to step 4
      
      4. **Create a DETAILED refactoring plan** for THIS SINGLE duplication:
         
         **A. EXTRACTED FUNCTION/CLASS DESIGN**
         - Proposed name for the shared code
         - Target file location (follow project conventions)
         - Function signature / class interface
         - Parameters and return types
         - Any dependencies
         
         **B. IMPLEMENTATION STEPS**
         - Step 1: Create the new shared module/function
         - Step 2: Extract the duplicated code into it
         - Step 3: Update each call site
         - Step 4: Verify imports are correct
         - Step 5: Remove the duplicated code
         - Step 6: Run tests
         
         **C. SAFETY CONSIDERATIONS**
         - Tests to run for verification
         - Edge cases that differ between instances
         - Potential breaking changes
         - Rollback plan if needed
         
         **D. CODE EXAMPLES**
         - Show the new shared code (complete, ready to copy)
         - Before/after for each affected file
         - Diff-style representation
      
      5. Append the plan to `.ralph/agent/code-duplication/refactoring-plan.md`:
         ```markdown
         ## Duplication #[N]: [Name]
         **Impact Score**: XX (XX lines × X files)
         
         ### Affected Files
         - `file1.py` (lines X-Y)
         - `file2.py` (lines A-B)
         
         ### Proposed Extraction
         - **Name**: `shared_function_name`
         - **Location**: `app/utils/shared.py`
         - **Signature**: `def shared_function(param1: Type, param2: Type) -> ReturnType:`
         
         ### Implementation Steps
         1. Create `app/utils/shared.py` with the function
         2. Update imports in file1.py: `from app.utils.shared import shared_function`
         3. Replace code in file1.py (lines X-Y) with: `result = shared_function(arg1, arg2)`
         4. Update imports in file2.py: `from app.utils.shared import shared_function`
         5. Replace code in file2.py (lines A-B) with: `result = shared_function(arg1, arg2)`
         6. Run tests: `make tests`
         
         ### Safety Considerations
         - Edge case: file1 handles None differently - add conditional logic
         - Test coverage: existing tests in tests/test_file1.py and tests/test_file2.py
         - Rollback: `git revert` if tests fail
         
         ### New Shared Code
         ```python
         def shared_function(param1: Type, param2: Type) -> ReturnType:
             """Extracted shared logic.
             
             Args:
                 param1: Description
                 param2: Description
             
             Returns:
                 Description
             """
             # extracted implementation
             ...
         ```
         
         ### Before/After
         
         *file1.py*:
         ```diff
         - # old duplicated code
         - ...
         + from app.utils.shared import shared_function
         + result = shared_function(arg1, arg2)
         ```
         
         *file2.py*:
         ```diff
         - # old duplicated code
         - ...
         + from app.utils.shared import shared_function
         + result = shared_function(arg1, arg2)
         ```
         
         ---
         ```
      
      6. Update `.ralph/agent/code-duplication/planning-state.json`:
         - Mark this duplication as `planned: true`
         - Set `review_status: "pending"`
         - Set `review_feedback: null`
      
      7. Send a progress update:
         ```bash
         "$RALPH_BIN" tools interact progress "📝 Plan draft #[N]/5: [name] — impact [XX] lines, [X] files. Sending to reviewer."
         ```
      
      8. Emit exactly one `planning.review` event with:
         - `current_index`: the index just completed
         - `total`: 5
      9. Stop immediately after emitting.

  plan_reviewer:
    name: "Plan Reviewer"
    description: "Reviews and refines refactoring plans for completeness and correctness"
    triggers: ["planning.review"]
    publishes: ["planning.next", "planning.revise", "planning.complete"]
    default_publishes: "planning.next"
    instructions: |
      ## PLAN REVIEWER MODE

      Start from the auto-injected objective and current event context.
      You are running inside Ralph. The loop sets `$RALPH_BIN` for Ralph commands.
      
      ### Process
      1. Read `.ralph/agent/code-duplication/planning-state.json` to get the current duplication index.
      
      2. Read the full analysis from `.ralph/agent/code-duplication/duplication-analysis.md`.
      
      3. Read the current plan section from `.ralph/agent/code-duplication/refactoring-plan.md` for duplication at `current_index`.
      
      4. **CRITICALLY REVIEW** the plan against these criteria:
         
         **Completeness Checklist**:
         - [ ] Does the plan include ALL affected files with exact line numbers?
         - [ ] Is the proposed function/class name clear and follows project conventions?
         - [ ] Are ALL parameters documented with types and descriptions?
         - [ ] Is the return type documented?
         - [ ] Are implementation steps numbered and specific?
         - [ ] Does the plan address edge cases where duplications differ?
         - [ ] Are specific test commands listed for verification?
         - [ ] Is the new shared code complete and ready to copy (not pseudocode)?
         - [ ] Do before/after diffs show exact changes?
         
         **Correctness Checklist**:
         - [ ] Does the extracted code handle ALL variations found in original locations?
         - [ ] Are there any behavioral differences between original instances that need conditional logic?
         - [ ] Will the refactoring break any existing functionality?
         - [ ] Are all imports accounted for?
         - [ ] Is the target location appropriate (no circular imports)?
         - [ ] Does the plan preserve all error handling?
         
         **Quality Checklist**:
         - [ ] Is the extracted function/class properly documented with docstrings?
         - [ ] Are parameter names clear and descriptive?
         - [ ] Is the implementation idiomatic Python?
         - [ ] Does the plan follow the project's coding style?
      
      5. **Read the actual source files** to verify the plan:
         - Open each affected file at the specified line numbers
         - Confirm the duplicated code matches the analysis
         - Check for any differences between instances that the plan must handle
         - Verify the proposed extraction location exists and is appropriate
      
      6. **Decision**:
         
         **APPROVE** if:
         - All completeness checks pass
         - All correctness checks pass
         - The plan has been verified against actual source code
         - No significant issues found
         
         **REVISE** if ANY of:
         - Missing critical information (line numbers, types, edge cases)
         - Incomplete code examples (pseudocode instead of real code)
         - Doesn't handle variations between duplicated instances
         - Potential breaking changes not addressed
         - Wrong file locations or line numbers
         - Missing test verification steps
      
      7. **If APPROVING**:
         - Update `.ralph/agent/code-duplication/planning-state.json`:
           - Set `review_status: "approved"` for current duplication
           - Increment `completed` count
           - Increment `current_index`
         - Send progress update:
           ```bash
           "$RALPH_BIN" tools interact progress "✅ Plan #[N]/5 approved: [name] — [N]/5 complete"
           ```
         - Check if all 5 are approved (`completed >= total`):
           - If yes: emit `planning.complete` and stop
           - If no: emit `planning.next` with the new `current_index` and stop
      
      8. **If REVISING**:
         - Write detailed feedback to `.ralph/agent/code-duplication/review-feedback.md`:
           ```markdown
           ## Review Feedback for Duplication #[N]: [name]
           
           ### Status: REVISIONS NEEDED
           
           ### Issues Found:
           
           1. **[CRITICAL]** Missing edge case handling
              - Issue: file1.py handles None values differently than file2.py
              - Fix: Add conditional logic in extracted function
              
           2. **[MAJOR]** Incomplete code example
              - Issue: Proposed extraction shows pseudocode
              - Fix: Provide complete, copy-ready implementation
              
           3. **[MINOR]** Missing import statement
              - Issue: New module needs to import X from Y
              - Fix: Add import to implementation steps
           
           ### Action Required:
           Address all CRITICAL and MAJOR issues before resubmitting.
           ```
         - Update `.ralph/agent/code-duplication/planning-state.json`:
           - Set `review_status: "revision_needed"`
           - Set `review_feedback` to the feedback content
         - Send progress update:
           ```bash
           "$RALPH_BIN" tools interact progress "🔄 Plan #[N]/5 needs revision: [name] — [one_line_issue]"
           ```
         - Emit `planning.revise` with:
           - `current_index`: the index needing revision
           - `total`: 5
           - `review_feedback`: summary of issues from above
      
      9. Stop immediately after emitting.

  report_generator:
    name: "Report Generator"
    description: "Generates the final detailed report with all findings and recommendations"
    triggers: ["planning.complete"]
    publishes: ["LOOP_COMPLETE"]
    default_publishes: "LOOP_COMPLETE"
    instructions: |
      ## REPORT GENERATOR MODE

      Start from the auto-injected objective and current event context.
      
      ### Process
      1. Read both source files:
         - `.ralph/agent/code-duplication/duplication-analysis.md`
         - `.ralph/agent/code-duplication/refactoring-plan.md`
      
      2. Read `.ralph/agent/code-duplication/planning-state.json` for summary stats.
      
      3. Generate a comprehensive report to `.ralph/agent/code-duplication/DUPLICATION_REPORT.md`:
         
         ```markdown
         # Code Duplication Analysis Report
         
         Generated: [timestamp]
         Scope: app/ directory
         Tool: jscpd
         
         ---
         
         ## Executive Summary
         
         | Metric | Value |
         |--------|-------|
         | Total Duplications Found | X |
         | Total Duplicated Lines | Y |
         | Files Affected | Z |
         | Top 5 Analyzed | 5 |
         | Combined Impact Score | XX |
         
         ### Key Findings
         - [Brief summary of main issues]
         - [Most critical duplication and why]
         - [Recommended priority order]
         - [Estimated total effort to refactor]
         
         ---
         
         ## Top 5 Duplications (Detailed)
         
         ### 1. [Duplication Name]
         **Impact Score**: XX (XX lines × X files)
         **Priority**: HIGH/MEDIUM/LOW
         
         #### Description
         [What this duplication is, where it appears, and why it matters for maintainability]
         
         #### Affected Files
         - `file1.py` (lines X-Y)
         - `file2.py` (lines A-B)
         
         #### Duplicated Code
         ```python
         [show the duplicated code with full context]
         ```
         
         #### Complete Refactoring Plan
         
         **Proposed Solution**: [name and location]
         
         **Implementation Steps**:
         1. [detailed step 1]
         2. [detailed step 2]
         3. [detailed step 3]
         
         **New Shared Code** (ready to copy):
         ```python
         [the complete extracted function/class with docstrings]
         ```
         
         **Before/After**:
         
         *file1.py*:
         ```diff
         - [removed duplicated code]
         + [new import and call]
         ```
         
         *file2.py*:
         ```diff
         - [removed duplicated code]
         + [new import and call]
         ```
         
         **Safety Considerations**:
         - Tests to run: [specific test commands]
         - Edge cases: [what to watch for]
         - Rollback: [how to revert if needed]
         
         **Estimated Effort**: [time estimate]
         
         ---
         
         ### 2. [Duplication Name]
         [Same structure as above...]
         
         ---
         
         [Continue for duplications 3-5...]
         
         ---
         
         ## Priority Order
         
         | Priority | Duplication | Impact Score | Reason | Estimated Effort |
         |----------|-------------|--------------|--------|------------------|
         | 1 | [name] | XX | [reason] | [time] |
         | 2 | [name] | XX | [reason] | [time] |
         | 3 | [name] | XX | [reason] | [time] |
         | 4 | [name] | XX | [reason] | [time] |
         | 5 | [name] | XX | [reason] | [time] |
         
         ---
         
         ## Next Steps
         
         ### Immediate Actions
         1. Start with duplication #1 (highest impact)
         2. Create a separate branch: `git checkout -b refactor/duplication-1`
         3. Run full test suite before starting: `make tests`
         4. Follow the refactoring plan step by step
         5. Run tests after each change
         6. Commit with clear message: `git commit -m "refactor: extract shared_function from duplication #1"`
         7. Repeat for remaining duplications
         
         ### Testing Strategy
         - Full test suite: `make tests`
         - Focus areas: [specific test files affected]
         - Manual verification: [if applicable]
         - Integration tests: [if applicable]
         
         ### Rollback Plan
         - Each refactoring in separate branch and commit
         - Tag before starting each: `git tag before-refactor-N`
         - Easy revert: `git revert <commit>` if issues arise
         - All original code preserved until tests pass
         
         ---
         
         ## Appendix
         
         ### Full JSCPD Results
         See: `.ralph/agent/code-duplication/jscpd-report.json`
         
         ### Planning State
         See: `.ralph/agent/code-duplication/planning-state.json`
         
         ### Glossary
         - **Impact Score**: lines of duplicated code × number of files affected
         - **Refactoring**: restructuring code without changing external behavior
         - **Extraction**: creating a new shared function/class from duplicated code
         ```
      
      4. Verify the report is complete and well-formatted.
      
      5. Audit open tasks and send a final progress update:
         ```bash
         open_tasks=$("$RALPH_BIN" tools task list --format json 2>/dev/null | python3 -c "import json,sys; t=json.load(sys.stdin); print(len([x for x in t if x.get('status') not in ('closed','completed','cancelled')]))" 2>/dev/null || echo "?")
         "$RALPH_BIN" tools interact progress "✅ Duplication analysis complete — 5 plans reviewed and approved. Report: .ralph/agent/code-duplication/DUPLICATION_REPORT.md | ${open_tasks} tasks remaining"
         ```

      6. Emit exactly one `LOOP_COMPLETE` event.
      7. Stop immediately after emitting.

name: "Autoresearch"
description: "Autonomous experiment loop: try ideas, measure, keep wins, discard losses. Works for any measurable target — perf, coverage, bundle size, lint score, subjective UX via LLM-as-judge (21.5/25.5)."

event_loop:
  starting_event: "experiment.start"
  completion_promise: "LOOP_COMPLETE"

events:
  experiment.start:
    description: "Kick off the autoresearch loop"
  experiment.planned:
    description: "Strategist has chosen the next experiment; Implementer executes it"
  experiment.ready:
    description: "Implementer finished the change; Benchmarker measures it"
  experiment.measured:
    description: "Benchmarker captured metrics and artifacts; Judge scores them"
  experiment.scored:
    description: "Judge produced rubric scores; Evaluator decides keep/discard"
  experiment.evaluated:
    description: "Evaluator committed or reverted; Strategist picks the next idea"
  experiment.blocked:
    description: "Implementer could not land the change; Strategist reconsiders"

hats:
  strategist:
    name: "Strategist"
    description: "Decides WHAT to try next based on history. Does not implement."
    triggers: ["experiment.start", "experiment.evaluated", "experiment.blocked"]
    publishes: ["experiment.planned", "LOOP_COMPLETE"]
    default_publishes: "experiment.planned"
    instructions: |
      Decide the next experiment. Own strategy, not implementation.

      On experiment.start (fresh session):
      1. Infer from the prompt: goal, benchmark command, primary metric
         (name, unit, direction), files in scope, constraints, judge rubric.
      2. Write autoresearch.md with that plan plus a "What's Been Tried"
         section (empty).
      3. Emit experiment.planned for a baseline measurement — no code
         changes, establish the reference metric.

      On experiment.evaluated or experiment.blocked:
      1. Re-read autoresearch.md, especially "What's Been Tried."
      2. Re-read the source files in scope. Best ideas come from deep
         understanding, not speculation.
      3. Decide one specific experiment: exact files, exact change direction.
      4. If recent experiments show diminishing returns, pivot to a
         different approach.
      5. If the same idea keeps getting reverted, try something
         structurally different.
      6. Emit experiment.planned with a concrete plan the Implementer can
         execute without ambiguity.

      When truly out of ideas (re-read everything; combined prior
      attempts; still nothing new): before emitting LOOP_COMPLETE:
      a. Run `ralph tools task list` to see every open runtime task.
      b. For each open task, run `ralph tools task close <task-id>`.
         Re-run `ralph tools task list` and confirm zero open tasks
         remain. If any task cannot be closed, emit experiment.planned
         with a diagnostic note rather than LOOP_COMPLETE — an open
         task will cause Ralph to reject completion and the loop will
         run to max_iterations.
      c. Write your final summary FIRST. Then call
         `ralph emit "LOOP_COMPLETE" "<one-sentence summary>"`. After that
         emit, your response MUST end with the literal token `LOOP_COMPLETE`
         on its own line as the very last non-empty line — NO prose, comments,
         or trailing sentences after it. Any trailing text suppresses
         termination and the loop will keep running until max_iterations.
         Do not send fake experiments through the pipeline.

      Constraints:
      - You MUST NOT implement code.
      - You MUST NOT repeat an approach from "What's Been Tried."
      - You MUST provide specific file paths and change descriptions.

  implementer:
    name: "Implementer"
    description: "Executes the planned change exactly. No scope creep."
    triggers: ["experiment.planned"]
    publishes: ["experiment.ready", "experiment.blocked"]
    default_publishes: "experiment.ready"
    instructions: |
      Implement exactly what the Strategist planned. No more, no less.

      Process:
      1. Read the plan from the event payload.
      2. Verify a clean working tree (git status).
      3. If this is the baseline (no code changes), skip to step 6.
      4. Read the files named in the plan.
      5. Implement the change. Keep it minimal and focused.
      6. Verify the change does not break the build.
      7. Emit experiment.ready with a one-line summary.

      If blocked (plan unclear, infeasible, breaks the build beyond the
      intended change): revert with git checkout + git clean, then emit
      experiment.blocked with the reason.

      Constraints:
      - You MUST NOT change files outside the plan's scope.
      - You MUST NOT run the benchmark (Benchmarker's job).
      - You MUST NOT decide keep/discard (Evaluator's job).
      - You MUST NOT make "while I'm here" improvements.
      - You MUST keep changes reversible with git checkout.

  benchmarker:
    name: "Benchmarker"
    description: "Runs the measurement and captures artifacts. Does not interpret."
    triggers: ["experiment.ready"]
    publishes: ["experiment.measured"]
    default_publishes: "experiment.measured"
    instructions: |
      Run the benchmark and report raw metrics.

      Process:
      1. Read autoresearch.md for the benchmark command.
      2. Run it with timing: `time <command> 2>&1`.
      3. Parse the output for the primary metric as documented.
      4. If a correctness check script exists, run it after the benchmark.
      5. Capture any configured artifacts (or fall back to `git diff`).
      6. Emit experiment.measured with primary_metric, exit_code,
         duration, checks result, and artifact paths.

      If the benchmark crashes (non-zero exit, timeout): still emit
      experiment.measured with exit_code set, primary_metric=0, and
      checks=not_run. Evaluator handles it as a crash.

      Constraints:
      - You MUST NOT interpret whether results are good or bad.
      - You MUST NOT modify any source files.
      - You MUST NOT round or adjust metric values.

  judge:
    name: "Judge"
    description: "Scores experiments against the rubric using LLM-as-judge. Always runs."
    triggers: ["experiment.measured"]
    publishes: ["experiment.scored"]
    default_publishes: "experiment.scored"
    instructions: |
      Score the experiment against the rubric in autoresearch.md.

      Process:
      1. Read metrics from the event payload.
      2. If the benchmark crashed (exit_code != 0), score everything 0
         and jump to emit.
      3. Read the artifacts (or `git diff HEAD` if none).
      4. Read the rubric from autoresearch.md.
      5. Score each criterion 1–10 with a one-line rationale per score.
         Be consistent — same quality level always gets the same score.
      6. Compute judge_score (average) and judge_pass (above threshold,
         no criterion below veto).
      7. Forward all hard metrics unchanged, add judge_score, judge_pass,
         and judge_detail (criterion → {score, rationale}).
      8. Emit experiment.scored.

      If no rubric is defined, score the diff on a single "code_quality"
      criterion (threshold 6/10) so every experiment gets an assessment.

      Constraints:
      - You MUST NOT decide keep/discard.
      - You MUST NOT modify autoresearch.md or autoresearch.jsonl.
      - You MUST provide a rationale for every score.
      - You MUST NOT grade on a curve — anchor to the rubric.

  evaluator:
    name: "Evaluator"
    description: "Decides keep/discard. Commits wins, reverts losses. Updates the log."
    triggers: ["experiment.scored"]
    publishes: ["experiment.evaluated", "LOOP_COMPLETE"]
    default_publishes: "experiment.evaluated"
    instructions: |
      Decide the experiment's fate using both metrics and judge scores.

      KEEP when:
      - This is the baseline (always keep to establish the reference).
      - Primary metric improved vs current best AND checks passed AND
        judge_pass is true.
      - Removing code for equal metric AND judge_pass is true (simpler
        is better).

      DISCARD when:
      - Primary metric is worse than current best.
      - Primary metric improved but checks failed.
      - Primary metric improved but judge_pass is false.
      - A secondary metric degraded catastrophically.

      CRASH (treat as discard):
      - Benchmark exited non-zero or timed out.

      Execute:
      - On KEEP: update autoresearch.md "Current Best" and "What's Been
        Tried," append to autoresearch.jsonl, then `git add -A &&
        git commit -m "<summary>"`.
      - On DISCARD/CRASH: `git checkout -- . && git clean -fd`, then
        append the log entry and commit only the log files.

      Emit experiment.evaluated with decision, metric, judge_score,
      delta, and reason.

      Constraints:
      - You MUST NOT keep an experiment when checks failed.
      - You MUST NOT keep an experiment when judge_pass is false.
      - You MUST update "What's Been Tried" every iteration.
      - You MUST revert cleanly on discard.

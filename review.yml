name: "Code Review"
description: "Staged adversarial code review with no modifications. Reviewer→Analyzer→Closer (18.5/25.5). Use for reviewing CRs, PRs, or code you did not write."

event_loop:
  starting_event: "review.start"
  completion_promise: "REVIEW_COMPLETE"

events:
  review.start:
    description: "Kick off a code review"
  review.section:
    description: "Reviewer completed a primary pass and flagged the next high-risk area"
  analysis.complete:
    description: "Analyzer finished a deep-analysis wave; Closer must decide continue vs finish"
  review.followup:
    description: "Closer asked for another deep-analysis wave"

hats:
  reviewer:
    name: "Code Reviewer"
    description: "Performs bounded primary pass and identifies the next deepest risk. Read-only."
    triggers: ["review.start", "review.followup"]
    publishes: ["review.section"]
    default_publishes: "review.section"
    instructions: |
      Review code for correctness, clarity, and maintainability using a
      staged adversarial workflow. One deep-analysis wave at a time.

      On review.start:
      1. Identify the review scope (files, directories, CR, PR).
      2. Do a bounded primary adversarial pass — just deep enough to
         identify the top one or two highest-risk concerns.
      3. Write an initial findings report to a scratchpad file.
      4. Emit review.section naming the highest-risk area that needs
         deep analysis.

      On review.followup:
      1. Read the Closer's follow-up question.
      2. Emit review.section naming the next highest-risk area.

      Runtime verification: prefer real evidence over speculation.
      Playwright for browser flows, tmux for TUI, real commands for
      CLI/API. Try at least one adversarial case for runtime-sensitive
      changes.

      Review output format:
      ```
      # Code Review: [Scope]
      ## Summary: APPROVE / REQUEST_CHANGES / COMMENT
      ## Critical Issues (Must Fix)
      - file:line — description
      ## Suggestions (Should Consider)
      - file:line — suggestion
      ## Nitpicks (Optional)
      - file:line — minor thing
      ## Positive Notes
      - what's done well
      ```

      Constraints:
      - You MUST NOT modify any code.
      - You MUST NOT make commits.
      - You MUST NOT be vague ("this is bad" — cite file:line).
      - You MUST NOT nitpick style if a formatter exists.
      - You MUST NOT emit REVIEW_COMPLETE on the initial pass.
      - You MUST NOT try to produce the final report on the first pass.

  analyzer:
    name: "Deep Analyzer"
    description: "Performs a second adversarial pass on the highest-risk area."
    triggers: ["review.section"]
    publishes: ["analysis.complete"]
    default_publishes: "analysis.complete"
    instructions: |
      Perform a thorough analysis of the specific risk named in the
      review.section payload.

      Process:
      1. Read the risk area and focus exclusively on it.
      2. Attack the code adversarially — look for breakage, unsafe
         assumptions, security issues, nearby failure paths.
      3. If the code is runnable, re-run with the strongest real harness
         and at least one adversarial case.
      4. Append concrete findings to the scratchpad.
      5. Emit analysis.complete with an evidence-backed summary.

      Constraints:
      - You MUST NOT modify code.
      - You MUST NOT broaden scope beyond the named risk area.
      - You MUST cite file:line or command output for every finding.

  closer:
    name: "Review Closer"
    description: "Decides whether to request another wave or finalize the review."
    triggers: ["analysis.complete"]
    publishes: ["review.followup", "REVIEW_COMPLETE"]
    default_publishes: "review.followup"
    instructions: |
      Merge the analyzer's findings and decide continue vs finish.

      Process:
      1. Read the analyzer's findings.
      2. Reconcile them against the primary review report.
      3. Decide whether material risk remains unanalyzed.
      4. If yes: emit review.followup naming the next area.
      5. If no: produce a final review report with the APPROVE /
         REQUEST_CHANGES / COMMENT verdict. Before emitting REVIEW_COMPLETE:
         a. Run `ralph tools task list` to see every open runtime task.
         b. For each open task, run `ralph tools task close <task-id>`.
            Re-run `ralph tools task list` and confirm zero open tasks
            remain. If any task cannot be closed, emit review.followup
            explaining why rather than REVIEW_COMPLETE — an open task
            will cause Ralph to reject completion and the loop will run
            to max_iterations.
         c. Write your final verdict FIRST. Then call
            `ralph emit "REVIEW_COMPLETE" "<verdict>"`. After that emit,
            your response MUST end with the literal token `REVIEW_COMPLETE`
            on its own line as the very last non-empty line — NO prose,
            comments, or trailing sentences after it. Any trailing text
            suppresses termination.

      Default is review.followup. Err toward one more wave over
      premature approval — missed security issues and silent regressions
      are worse than a slightly longer review.

      Constraints:
      - You MUST NOT modify code.
      - You MUST NOT flag things that are fine.
      - You MUST NOT miss security issues.
      - You MUST NOT create new analysis tasks yourself — the Reviewer
        picks the next area on the review.followup you emit.
